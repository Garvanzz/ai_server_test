CommonAddr = "root:@Xiao1998@tcp(127.0.0.1:5001)/xiyou?&charset=utf8mb4&collation=utf8mb4_general_ci"

# 网关配置[websocket]
[Gate]
Host = "0.0.0.0:8081"
MaxMessageSize = 4096 # 最大消息包长度
MessageBufferSize = 1024 # 消息缓冲区大小
PingPeriod = "0s" # ping超时，单位：秒
PongWait = "60s" # pong超时, 单位：秒
WriteWait = "10s" # 写超时，单位：秒

#TCP
[TcpGate]
Ip = "0.0.0.0"
Port = 8082
MaxMessageSize = 4096 # 最大消息包长度
MessageBufferSize = 1024 # 消息缓冲区大小
PingPeriod = "0s" # ping超时，单位：秒
PongWait = "60s" # pong超时, 单位：秒
WriteWait = "10s" # 写超时，单位：秒

[Mongo]
MaxConnIdleTime = "0s"
MaxPoolSize = 100
MinPoolSize = 0
Url = "mongodb://127.0.0.1:27017"

[Redis]
Host = "127.0.0.1:6200"
Password = "Xiao1998"
