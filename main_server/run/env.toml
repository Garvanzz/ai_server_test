# 基础配置
ID = 1
RemoteName = "public"
RemoteHost = "0.0.0.0"
RemotePort = 1001
ConfPath = "../../core/config/json" # 配置文件路径
Debug = true # 是否debug模式
HttpUrl ="0.0.0.0:9505"

#Mysql
[Mysql]
AccountAddr = "root:@Xiao1998@tcp(47.121.121.101:5001)/wenjiacheng?&charset=utf8mb4&collation=utf8mb4_general_ci"
PayAddr = "root:@Xiao1998@tcp(47.121.121.101:5001)/wenjiacheng?&charset=utf8mb4&collation=utf8mb4_general_ci"
CommonAddr = "root:@Xiao1998@tcp(47.121.121.101:5001)/wenjiacheng?&charset=utf8mb4&collation=utf8mb4_general_ci"
MaxIdleConns = 240        # 连接池最大空闲连接数
MaxOpenConns = 1200       # 连接池最大打开连接数（需小于 MySQL max_connections）
ConnMaxLifetime = "4h"    # 连接最大存活时间（需小于 MySQL wait_timeout）

# 网关配置[websocket]
[Gate]
Host = "0.0.0.0:8081"
MaxMessageSize = 4096 # 最大消息包长度
MessageBufferSize = 1024 # 消息缓冲区大小
PingPeriod = "0s" # ping超时，单位：秒
PongWait = "60s" # pong超时, 单位：秒
WriteWait = "10s" # 写超时，单位：秒

#TCP
[TcpGate]
Ip = "0.0.0.0"
Port = 8082
MaxMessageSize = 4096     # 最大消息包长度
MessageBufferSize = 2000  # Session 发送队列大小（实际驱动 sendChanSize）
PingPeriod = "0s"         # ping 超时，0 表示不主动 ping
PongWait = "60s"          # pong 超时
WriteWait = "10s"         # 写超时

[Redis]
Host = "172.16.1.50:6379"
Password = ""
DbNum = 1
MaxIdle = 200             # 连接池最大空闲连接数
MaxActive = 2000          # 连接池最大活跃连接数
IdleTimeout = "1h"        # 空闲连接超时时间
ConnectTimeout = "5s"     # TCP 拨号超时
ReadTimeout = "3s"        # 读操作超时（防止 Redis 阻塞卡死 worker）
WriteTimeout = "3s"       # 写操作超时

[LoginRedis]
Host = "172.16.1.50:6379"
Password = ""
DbNum = 2
MaxIdle = 50
MaxActive = 200
IdleTimeout = "1h"
ConnectTimeout = "5s"
ReadTimeout = "3s"
WriteTimeout = "3s"

[Log]
WriteFile = false
FilePath = "./main.log"
Level = "DEBUG"
Prefix = ""
MaxSize = 100
MaxBackups = 10
MaxAge = 30
Compress = true


