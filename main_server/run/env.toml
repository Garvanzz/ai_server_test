Debug = true # 是否debug模式
HttpUrl ="0.0.0.0:9505"

#Mysql
[Mysql]
AccountAddr = "root:@Xiao1998@tcp(127.0.0.1:5001)/xiyou?&charset=utf8mb4&collation=utf8mb4_general_ci"
